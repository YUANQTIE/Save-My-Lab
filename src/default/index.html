<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../../images/favicon.ico">
    <title>Save.My.Lab</title>
    <link rel="stylesheet" href="css/index.css">
</head>

<body class="h-screen flex flex-col">

    <!-- HEADER -->
    <header id="head" class="absolute top-0 left-0 w-full flex justify-between items-center p-6 z-10">
        <img class="w-40" src="../../images/white.png" alt="App Logo">
    </header>

    <!-- MAIN -->
    <main class="background flex-1 flex items-center justify-center">

        <div class="w-[987px] h-[641px] rounded-[90px] flex overflow-hidden shadow-2xl">

            <!-- LEFT IMAGE -->
            <div class="w-1/2 relative overflow-hidden">
                <img src="../../images/cardimage.jpg" class="w-full h-full object-cover scale-110">
                <div class="absolute inset-0 bg-[rgba(35,74,21,0.77)]"></div>
            </div>

            <!-- LOGIN FORM -->
            <div
                class="w-1/2 flex flex-col items-center pt-10 px-8 bg-gradient-to-b from-white via-white/70 to-[#265429]/40">

                <img class="w-28 mb-2" src="../../images/dlsupng.png">

                <h2 class="text-4xl font-bold text-[#016938] mb-6">
                    Welcome
                </h2>

                <div class="w-full max-w-sm space-y-4">

                    <!-- EMAIL -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-[#016938] font-semibold">Email</span>
                        </label>

                        <input type="email" placeholder="Enter your email" class="input input-bordered w-full bg-[#FAFAFA] placeholder:text-[#D9D9D9]
focus:ring-2 focus:ring-[#265429]">
                    </div>

                    <!-- PASSWORD -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-[#016938] font-semibold">Password</span>
                        </label>

                        <input type="password" placeholder="Enter your password" class="input input-bordered w-full bg-[#FAFAFA] placeholder:text-[#D9D9D9]
focus:ring-2 focus:ring-[#265429]">
                    </div>

                    <!-- ACTIONS -->
                    <div class="flex items-center justify-between pt-2">

                        <label class="flex items-center gap-2 text-sm text-[#016938] cursor-pointer">
                            <input type="checkbox" class="accent-[#265429]">
                            Remember me
                        </label>

                        <button
                            class="btn btn-sm bg-[#265429] text-white border-none hover:bg-[#1f4320] rounded-full px-6">
                            Log In
                        </button>

                    </div>

                    <!-- LINKS -->
                    <div class="flex justify-center gap-6 pt-3 text-sm">

                        <a href="forgot.html" class="text-[#265429] hover:underline">Forgot Password</a>
                        <a href="register.html" class="text-[#265429] hover:underline">Register</a>
                        <a href="view-slot-availability.html" class="text-[#265429] hover:underline">View Availability</a>

                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="absolute bottom-0 w-full text-center text-white p-4 z-10">
        Lab Reservation System by Labron James Group
    </footer>

    <script src="scripts/index.js"></script>

</body>

</html>
