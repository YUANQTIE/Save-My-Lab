<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save.My.Lab</title>
  <link rel="icon" href="../../images/favicon.ico" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white">

  <!-- Navbar -->
  <header class="relative">
    <div class="w-full">
      <nav class="flex items-center justify-between px-8 py-4 min-h-[100px] shadow-sm" style="
             background-image: linear-gradient(rgba(16, 77, 5, 0.7), rgba(16, 77, 5, 0.7)), 
                               url('../../images/dlsubg1.jpg');
             background-size: cover;
             background-position: center;
             background-repeat: no-repeat;
           ">
        <!-- Left menu icon -->
        <button class="btn btn-square btn-ghost">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            class="inline-block h-6 w-6 stroke-current text-white">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>

        <!-- Logo -->
        <div class="flex-1 flex justify-center lg:justify-start">
            <img src="../../images/white.png" alt="Save.My.Lab Logo" class="h-16">
        </div>

        <!-- Right menu icon -->
        <button class="btn btn-square btn-ghost ">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            class="inline-block h-6 w-6 stroke-current text-white">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z" />
          </svg>
        </button>
      </nav>
    </div>
  </header>
  <!-- Main Content -->
  <main class="bg-white min-h-screen px-8 py-12">
    
  </main>

</body>

</html>
