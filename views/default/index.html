<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <title>Save.My.Lab</title>
    <link rel="stylesheet" href="css/default/index.css">
</head>

<body class="h-screen flex flex-col">

    <header id="head" class="absolute top-0 left-0 w-full flex justify-between items-center p-6 z-10">
        <img class="w-40" src="/images/white.png" alt="App Logo">
    </header>

    <main class="background flex-1 flex items-center justify-center">

        <div id="cardContainer1" class="w-[987px] h-[641px] rounded-[90px] flex overflow-hidden shadow-2xl transition-all duration-500">

            <div class="w-1/2 relative overflow-hidden">
                <img src="/images/cardimage.jpg" class="w-full h-full object-cover scale-110">
                <div class="absolute inset-0 bg-[rgba(35,74,21,0.77)]"></div>
            </div>

            
            <div class="w-1/2 flex flex-col items-center pt-10 px-8 bg-gradient-to-b from-white via-white/70 to-[#265429]/40">
                <button id="changeToAdmin" class=" self-start btn btn-sm bg-[#265429] text-white border-none hover:bg-[#1f4320] rounded-full px-5">
                    Switch to Admin
                </button>
                <img class="w-28 mb-2" src="images/dlsupng.png">

                <h2 class="text-4xl font-bold text-[#016938] mb-6">User Login</h2>
                <h1 id="userLoginErr" class="text-2xl text-[#FF0000] mb-6"></h2>
                <div class="w-full max-w-sm space-y-4">

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-[#016938] font-semibold">Email</span>
                        </label>
                        <input id="userEmailInput" type="email" placeholder="Enter your email"
                            class="input input-bordered w-full bg-[#FAFAFA] placeholder:text-[#D9D9D9] focus:ring-2 focus:ring-[#265429]">
                    </div>

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-[#016938] font-semibold">Password</span>
                        </label>
                        <div class="relative">
                            <input id="userPasswordInput" type="password"
                                class="py-2.5 sm:py-3 ps-4 pe-10 block input input-bordered w-full bg-[#FAFAFA] placeholder:text-[#D9D9D9] border-layer-line rounded-lg sm:text-sm text-foreground placeholder:text-muted-foreground-1 focus:ring-2 focus:ring-[#265429] disabled:opacity-50 disabled:pointer-events-none"
                                placeholder="Enter password" value="">
                            <button type="button" id="show_password_btn_user" data-hs-toggle-password='{"target": "#hs-toggle-password"}' class="absolute inset-y-0 end-0 flex items-center z-20 px-3 cursor-pointer text-muted-foreground rounded-e-md focus:outline-hidden focus:text-primary-focus">
                                <svg class="shrink-0 size-3.5" width="24" height="24" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path class="hs-password-active:hidden" d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                                    <path class="hs-password-active:hidden"
                                        d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                                    <path class="hs-password-active:hidden"
                                        d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                                    <line class="hs-password-active:hidden" x1="2" x2="22" y1="2" y2="22" />
                                    <path class="hidden hs-password-active:block"
                                        d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                    <circle class="hidden hs-password-active:block" cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between pt-2">
                        <label class="flex items-center gap-2 text-sm text-[#016938] cursor-pointer">
                            <input id= "rememberMeUser" type="checkbox" class="accent-[#265429]"> Remember me
                        </label>
                        <button id="loginUserBtn"
                            class="btn btn-sm bg-[#265429] text-white border-none hover:bg-[#1f4320] rounded-full px-6">
                            Log In
                        </button>
                    </div>

                    <div class="flex justify-center gap-6 pt-3 text-sm">
                        <button id="forgotUserBtn" class="text-[#265429] hover:underline">Forgot Password</a>
                            <button id="registerUserBtn" class="text-[#265429] hover:underline">Register</a>
                    </div>

                </div>
            </div>
        </div>

        <div id="cardContainer2" class="hidden w-[987px] h-[641px] rounded-[90px] flex overflow-hidden shadow-2xl transition-all duration-500">
            
            <div class="w-1/2 flex flex-col items-center pt-10 px-8 bg-gradient-to-b from-white via-white/70 to-[#265429]/40">
                <button id="changeToUser" class=" self-end btn btn-sm bg-[#265429] text-white border-none hover:bg-[#1f4320] rounded-full px-5">
                    Switch to User
                </button>
                <img class="w-28 mb-2" src="images/dlsupng.png">

                <h2 class="text-4xl font-bold text-[#016938] mb-6">Admin Login</h2>
                <h1 id="adminLoginErr" class="text-2xl text-[#FF0000] mb-6"></h2>
                <div class="w-full max-w-sm space-y-4">

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-[#016938] font-semibold">Email</span>
                        </label>
                        <input id="adminEmailInput" type="email" placeholder="Enter your email"
                            class="input input-bordered w-full bg-[#FAFAFA] placeholder:text-[#D9D9D9] focus:ring-2 focus:ring-[#265429]">
                    </div>

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text text-[#016938] font-semibold">Password</span>
                        </label>
                        <div class="relative">
                            <input id="adminPasswordInput" type="password"
                                class="py-2.5 sm:py-3 ps-4 pe-10 block input input-bordered w-full bg-[#FAFAFA] placeholder:text-[#D9D9D9] border-layer-line rounded-lg sm:text-sm text-foreground placeholder:text-muted-foreground-1 focus:ring-2 focus:ring-[#265429] disabled:opacity-50 disabled:pointer-events-none"
                                placeholder="Enter password" value="">
                            <button type="button" id="show_password_btn_admin" data-hs-toggle-password='{"target": "#hs-toggle-password"}' class="absolute inset-y-0 end-0 flex items-center z-20 px-3 cursor-pointer text-muted-foreground rounded-e-md focus:outline-hidden focus:text-primary-focus">
                                <svg class="shrink-0 size-3.5" width="24" height="24" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path class="hs-password-active:hidden" d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                                    <path class="hs-password-active:hidden"
                                        d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                                    <path class="hs-password-active:hidden"
                                        d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                                    <line class="hs-password-active:hidden" x1="2" x2="22" y1="2" y2="22" />
                                    <path class="hidden hs-password-active:block"
                                        d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                    <circle class="hidden hs-password-active:block" cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between pt-2">
                        <label class="flex items-center gap-2 text-sm text-[#016938] cursor-pointer">
                            <input id= "rememberMeAdmin" type="checkbox" class="accent-[#265429]"> Remember me
                        </label>
                        <button id="loginAdminBtn"
                            class="btn btn-sm bg-[#265429] text-white border-none hover:bg-[#1f4320] rounded-full px-6">
                            Log In
                        </button>
                    </div>

                    <div class="flex justify-center gap-6 pt-3 text-sm">
                        <button id="forgotAdminBtn" class="text-[#265429] hover:underline">Forgot Password</a>
                    </div>

                </div>
            </div>

            <div class="w-1/2 relative overflow-hidden">
                <img src="/images/cardimage.jpg" class="w-full h-full object-cover scale-110">
                <div class="absolute inset-0 bg-[rgba(35,74,21,0.77)]"></div>
            </div>
        </div>
    </main>

    <footer class="absolute bottom-0 w-full text-center text-white p-4 z-10">
        Lab Reservation System by Labron James Group
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/scripts/default/index.js"></script>

</body>

</html>
